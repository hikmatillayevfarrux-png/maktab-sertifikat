<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sertifikat Tizimi</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; width: 90%; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 16px; }
        .verify-box { background: #e3f2fd; padding: 15px; border-radius: 10px; margin-top: 15px; border: 1px dashed #007bff; }
        canvas { display: none; } /* Sertifikat yashirincha tayyorlanadi */
    </style>
</head>
<body>

<div class="card">
    <h2>Sertifikatni olish</h2>
    <p>ID raqamingizni kiriting:</p>
    <input type="text" id="studentID" placeholder="Masalan: 1341036">
    <button onclick="checkID()">Tekshirish</button>
    
    <div id="result"></div>
    <canvas id="certCanvas" width="800" height="600"></canvas>
</div>

<script>
let foundStudent = null;

async function checkID() {
    const idInput = document.getElementById('studentID').value;
    const res = document.getElementById('result');
    
    try {
        const response = await fetch('ReportStudentList.xlsx');
        const data = await response.arrayBuffer();
        const workbook = XLSX.read(data, { type: 'array' });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet);

        foundStudent = rows.find(r => String(r['ID']) === idInput);

        if(foundStudent) {
            res.innerHTML = `
                <div class="verify-box">
                    <p><b>${foundStudent['Полное наименование']}</b></p>
                    <p>Pochtangizga kod yuborildi.</p>
                    <input type="text" id="otpCode" placeholder="6 xonali kod">
                    <button onclick="generateCert()" style="background: #28a745">Tasdiqlash va Yuklash</button>
                </div>`;
        } else {
            alert("ID topilmadi!");
        }
    } catch (e) {
        alert("Excel fayli topilmadi yoki xato!");
    }
}

function generateCert() {
    const canvas = document.getElementById('certCanvas');
    const ctx = canvas.getContext('2d');
    const img = new Image();
    
    // BU YERGA: Sertifikat shabloni rasm havolasini qo'ying
    img.src = 'https://img.freepik.com/free-vector/professional-certificate-template_23-2148914144.jpg'; 
    
    img.onload = function() {
        ctx.drawImage(img, 0, 0, 800, 600);
        ctx.font = 'bold 30px sans-serif';
        ctx.fillStyle = '#1a1a1a';
        ctx.textAlign = 'center';
        
        // Ismni rasmning o'rtasiga yozish
        ctx.fillText(foundStudent['Полное наименование'], 400, 300);
        ctx.font = '20px sans-serif';
        ctx.fillText("Sinf: " + foundStudent['Класс'], 400, 350);

        // Yuklab olish
        const link = document.createElement('a');
        link.download = 'Sertifikat_' + foundStudent['ID'] + '.png';
        link.href = canvas.toDataURL();
        link.click();
    };
}
</script>
</body>
</html>
