<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sertifikat Yuklash</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 16px; transition: 0.3s; }
        button:hover { background: #0056b3; }
        .result-box { margin-top: 20px; padding: 15px; background: #e9ecef; border-radius: 10px; display: none; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>Maktab Sertifikati</h2>
    <input type="text" id="studentID" placeholder="ID raqamingizni kiriting">
    <button onclick="findStudent()">Sertifikatni topish</button>
    
    <div id="resultBox" class="result-box">
        <p id="displayName" style="font-weight: bold; color: #333;"></p>
        <p style="font-size: 14px; color: #666;">Pochtangizga tasdiqlash kodi yuborildi.</p>
        <input type="text" id="otp" placeholder="Kodni kiriting">
        <button onclick="downloadCert()" style="background: #28a745;">Yuklab olish</button>
    </div>
</div>

<canvas id="certCanvas"></canvas>

<script>
let currentStudent = null;

async function findStudent() {
    const id = document.getElementById('studentID').value;
    if(!id) return alert("ID kiriting!");

    try {
        const resp = await fetch('ReportStudentList.xlsx');
        const data = await resp.arrayBuffer();
        const wb = XLSX.read(data, {type: 'array'});
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet);

        // A ustunidagi ID va B ustunidagi ismni tekshirish
        currentStudent = rows.find(r => String(r['ID']) === id);

        if(currentStudent) {
            document.getElementById('displayName').innerText = currentStudent['Полное наименование'];
            document.getElementById('resultBox').style.display = 'block';
        } else {
            alert("Bunday ID topilmadi!");
        }
    } catch (e) {
        alert("Fayllarni yuklashda xato!");
    }
}

function downloadCert() {
    const canvas = document.getElementById('certCanvas');
    const ctx = canvas.getContext('2d');
    const img = new Image();
    
    // Siz yuklagan rasm nomi
    img.src = 'IMG_20260422_191321.jpg'; 
    
    img.onload = function() {
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.drawImage(img, 0, 0);
        
        // Ismni yozish (Rasm o'lchamiga qarab joyini to'g'irlaymiz)
        ctx.font = 'bold 40px Arial';
        ctx.fillStyle = '#2c3e50';
        ctx.textAlign = 'center';
        
        // Rasmning o'rtasiga ismni yozish
        ctx.fillText(currentStudent['Полное наименование'], canvas.width / 2.8, canvas.height / 2.3);
        
        const link = document.createElement('a');
        link.download = 'Sertifikat.png';
        link.href = canvas.toDataURL();
        link.click();
    };
}
</script>
</body>
</html>
