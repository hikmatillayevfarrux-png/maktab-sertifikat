<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sertifikat Tizimi</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 2px solid #e0e0e0; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; }
        .verify-box { margin-top: 20px; padding: 20px; background: #f8f9fa; border-radius: 15px; border: 2px dashed #28a745; display: none; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="color: #1a73e8;">Sertifikatni olish</h2>
    <input type="text" id="studentID" placeholder="ID raqamingizni kiriting">
    <button onclick="checkID()">Tekshirish</button>
    
    <div id="verifyBox" class="verify-box">
        <h3 id="stName" style="margin-bottom: 10px; color: #333;"></h3>
        <input type="text" id="otp" placeholder="Tasdiqlash kodi">
        <button onclick="generateAndDownload()" style="background: #28a745">Tasdiqlash va Yuklash</button>
    </div>
</div>

<canvas id="certCanvas"></canvas>

<script>
let foundUser = null;

async function checkID() {
    const idVal = document.getElementById('studentID').value;
    try {
        const resp = await fetch('ReportStudentList.xlsx');
        const data = await resp.arrayBuffer();
        const wb = XLSX.read(data, {type: 'array'});
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet);

        foundUser = rows.find(r => String(r['ID']) === idVal);

        if(foundUser) {
            document.getElementById('stName').innerText = foundUser['Полное наименование'];
            document.getElementById('verifyBox').style.display = 'block';
        } else {
            alert("ID topilmadi!");
        }
    } catch (e) {
        alert("Fayl o'qishda xatolik!");
    }
}

function generateAndDownload() {
    const canvas = document.getElementById('certCanvas');
    const ctx = canvas.getContext('2d');
    const img = new Image();
    
    // GitHub'dagi rasm nomingiz bilan bir xil bo'lishi shart!
    img.src = 'IMG_20260422_191321_972.jpg'; 
    img.crossOrigin = "anonymous";

    img.onload = function() {
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.drawImage(img, 0, 0);
        
        // Ismni yozish (Sizning shabloningizga moslangan)
        ctx.font = '500 42px "Segoe UI", Arial'; // Kursdagi kabi shrift
        ctx.fillStyle = '#2d3436'; 
        ctx.textAlign = 'left';
        
        // 110 - chapdan masofa, 395 - tepadan masofa
        ctx.fillText(foundUser['Полное наименование'], 110, 395);
        
        // Sanani yozish
        ctx.font = '18px Arial';
        ctx.fillText("Apr 22, 2026", 110, 275);

        // Yuklab olish
        const link = document.createElement('a');
        link.download = foundUser['Полное наименование'] + '.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    };

    img.onerror = function() {
        alert("Rasm yuklanmadi! Nomi xato bo'lishi mumkin.");
    };
}
</script>
</body>
</html>
