<!DOCTYPE html><html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pro Sertifikat Platforma</title>
  <style>
    body{
      font-family: Arial;
      background:#0f172a;
      color:white;
      text-align:center;
      padding:20px;
    }
    .box{
      background:#1e293b;
      padding:20px;
      border-radius:15px;
      max-width:500px;
      margin:auto;
    }
    input{
      padding:10px;
      width:80%;
      margin:10px 0;
      border-radius:8px;
      border:none;
    }
    button{
      padding:10px 15px;
      border:none;
      border-radius:8px;
      background:#38bdf8;
      color:black;
      font-weight:bold;
      cursor:pointer;
      margin:5px;
    }
    .cert{
      margin-top:20px;
      padding:20px;
      border:2px dashed white;
      border-radius:10px;
      display:none;
    }
  </style>
</head>
<body><h1>🎓 Pro Sertifikat Platforma</h1><div class="box">
  <input type="text" id="name" placeholder="Ismingizni yozing" />
  <br>
  <button onclick="startTest()">Testni boshlash</button>  <div id="testBox" style="display:none;">
    <h3 id="q"></h3>
    <div id="opts"></div>
  </div>  <div class="cert" id="cert">
    <h2>🎉 Sertifikat</h2>
    <p>Bu sertifikat quyidagi shaxsga berildi:</p>
    <h3 id="certName"></h3>
    <p id="score"></p>
    <button onclick="downloadCert()">Download</button>
  </div>
</div><script>
const questions = [
  {
    q:"AI nima?",
    options:["Sun’iy intellekt","Telefon","O‘yin"],
    a:0
  },
  {
    q:"HTML nima?",
    options:["Til","O‘yin","Video"],
    a:0
  }
];

let current=0;
let score=0;

function startTest(){
  document.getElementById("testBox").style.display="block";
  showQ();
}

function showQ(){
  let q=questions[current];
  document.getElementById("q").innerText=q.q;
  let html="";
  q.options.forEach((o,i)=>{
    html+=`<button onclick="ans(${i})">${o}</button><br>`;
  });
  document.getElementById("opts").innerHTML=html;
}

function ans(i){
  if(i===questions[current].a) score++;
  current++;

  if(current<questions.length){
    showQ();
  }else{
    showCert();
  }
}

function showCert(){
  document.getElementById("testBox").style.display="none";
  document.getElementById("cert").style.display="block";

  let name=document.getElementById("name").value;
  document.getElementById("certName").innerText=name;
  document.getElementById("score").innerText="Natija: "+score+"/"+questions.length;
}

function downloadCert(){
  let printWindow=window.open('','');
  printWindow.document.write(document.getElementById("cert").innerHTML);
  printWindow.print();
}
</script></body>
</html>
