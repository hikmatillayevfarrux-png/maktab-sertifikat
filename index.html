<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sertifikat Yuklash</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 2px solid #e0e0e0; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #0056b3; }
        .verify-box { margin-top: 20px; padding: 20px; background: #f8f9fa; border-radius: 15px; border: 2px dashed #28a745; display: none; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="color: #1a73e8;">Sertifikatni olish</h2>
    <input type="text" id="studentID" placeholder="ID raqamingiz">
    <button onclick="checkID()">Tekshirish</button>
    
    <div id="verifyBox" class="verify-box">
        <h3 id="stName" style="margin: 0; color: #333;"></h3>
        <p style="font-size: 14px; color: #666;">Yuklash uchun pastdagi tugmani bosing.</p>
        <button onclick="generateAndDownload()" style="background: #28a745">Yuklash (PNG)</button>
    </div>
</div>

<canvas id="certCanvas"></canvas>

<script>
let foundUser = null;

async function checkID() {
    const idVal = document.getElementById('studentID').value;
    try {
        const resp = await fetch('ReportStudentList.xlsx');
        const data = await resp.arrayBuffer();
        const wb = XLSX.read(data, {type: 'array'});
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet);

        foundUser = rows.find(r => String(r['ID']) === idVal);

        if(foundUser) {
            document.getElementById('stName').innerText = foundUser['Полное наименование'];
            document.getElementById('verifyBox').style.display = 'block';
        } else {
            alert("ID topilmadi!");
        }
    } catch (e) {
        alert("Fayllarni yuklashda xato!");
    }
}

function generateAndDownload() {
    const canvas = document.getElementById('certCanvas');
    const ctx = canvas.getContext('2d');
    const img = new Image();
    
    // Siz yuklagan rasm nomi (GitHub-dagi nom bilan bir xil bo'lishi kerak)
    img.src = 'IMG_20260422_191321_972.jpg'; 
    img.crossOrigin = "anonymous";

    img.onload = function() {
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.drawImage(img, 0, 0);
        
        // 1. ISMNI YOZISH (Chiroyli joylashuv)
        ctx.font = '500 48px "Segoe UI", Arial'; // Biroz kattaroq va chiroyliroq shrift
        ctx.fillStyle = '#1e272e'; // Rangi (to'q kulrang)
        ctx.textAlign = 'left';
        
        // Ismni tepaga surish (395 o'rniga 350 koordinata)
        // Shunda u Scrimba dizaynidagi bo'sh joyga aniq tushadi.
        ctx.fillText(foundUser['Полное наименование'], 110, 350);
        
        // 2. SANANI YOZISH (To'g'ri joylashuv)
        ctx.font = '20px Arial';
        ctx.fillStyle = '#636e72'; // Biroz ochroq rang
        
        // Sanani Scrimba logotipi tagiga tushirish (275 o'rniga 305 koordinata)
        ctx.fillText("Apr 22, 2026", 110, 305); 

        // Faylni yuklab olish
        const link = document.createElement('a');
        link.download = foundUser['Полное наименование'] + '_Sertifikat.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    };
}
</script>
</body>
</html>
