<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sertifikat Yuklash Tizimi</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 2px solid #e0e0e0; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #0056b3; }
        .verify-box { margin-top: 20px; padding: 20px; background: #f8f9fa; border-radius: 15px; border: 2px dashed #28a745; display: none; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="color: #1a73e8;">Sertifikatni olish</h2>
    <input type="text" id="studentID" placeholder="ID raqamingizni kiriting">
    <button onclick="checkID()">Tekshirish</button>
    
    <div id="verifyBox" class="verify-box">
        <h3 id="stName" style="margin: 0; color: #333;"></h3>
        <p style="font-size: 14px; color: #666; margin: 10px 0;">ID tasdiqlandi.</p>
        <button onclick="generateAndDownload()" style="background: #28a745">Yuklab olish (PNG)</button>
    </div>
</div>

<canvas id="certCanvas"></canvas>

<script>
let foundUser = null;

async function checkID() {
    const idVal = document.getElementById('studentID').value;
    try {
        const resp = await fetch('ReportStudentList.xlsx');
        const data = await resp.arrayBuffer();
        const wb = XLSX.read(data, {type: 'array'});
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet);
        foundUser = rows.find(r => String(r['ID']) === idVal);

        if(foundUser) {
            document.getElementById('stName').innerText = foundUser['Полное наименование'];
            document.getElementById('verifyBox').style.display = 'block';
        } else {
            alert("Bunday ID topilmadi!");
        }
    } catch (e) {
        alert("Fayllarni yuklashda xatolik yuz berdi!");
    }
}

function generateAndDownload() {
    const canvas = document.getElementById('certCanvas');
    const ctx = canvas.getContext('2d');
    const img = new Image();
    
    // GitHub'dagi rasm nomingiz
    img.src = 'IMG_20260422_191321_972.jpg'; 
    img.crossOrigin = "anonymous";

    img.onload = function() {
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.drawImage(img, 0, 0);
        
        // 1. ESKI ISMNI O'CHIRISH (Oq rang bilan yopish)
        // Farruxjon yozuvi turgan joyni oq to'rtburchak bilan berkitamiz
        ctx.fillStyle = '#ffffff'; 
        ctx.fillRect(100, 310, 500, 110); 

        // 2. YANGI ISMNI YOZISH
        ctx.font = '500 44px Arial, sans-serif'; 
        ctx.fillStyle = '#2c3e50'; 
        ctx.textAlign = 'left';
        // Ismni o'sha bo'shatilgan joyning o'rtasiga yozish
        ctx.fillText(foundUser['Полное наименование'], 110, 360); 
        
        // 3. SANANI YOZISH
        ctx.font = '18px Arial';
        ctx.fillStyle = '#7f8c8d';
        // Sanani logotip tagiga aniq tushirish
        ctx.fillText("Apr 22, 2026", 110, 305); 

        // Yuklab olish linkini yaratish
        const link = document.createElement('a');
        link.download = foundUser['Полное наименование'] + '_Sertifikat.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    };
}
</script>
</body>
</html>
